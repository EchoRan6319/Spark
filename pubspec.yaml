name: spark
description: "灵光 - 全平台创意管理应用，帮助你捕捉、分析、管理和实现灵感。"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI - 液态玻璃组件库
  liquid_glass_widgets: ^0.7.17
  font_awesome_flutter: ^10.8.0

  # 状态管理
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # 路由
  go_router: ^14.8.1

  # 本地存储
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # 网络
  http: ^1.2.2

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5

  # 多媒体
  image_picker: ^1.1.2
  flutter_svg: ^2.0.17

  # 动画
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
